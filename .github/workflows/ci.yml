name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela ejecuciones previas del mismo ref si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · build + tests + E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Build (nest)
        run: npm run build

      - name: Tests unitarios (jest)
        run: npm test

      - name: Verificación E2E (Postgres embebido)
        run: npm run verify:e2e

  flutter:
    name: Flutter · análisis estático
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analizar (flutter analyze)
        run: flutter analyze
