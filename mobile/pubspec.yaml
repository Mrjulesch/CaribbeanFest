name: caribbean_fest
description: App de gestión de torneos de voleibol (Web + Android + iOS)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1 # gestión de estado
  go_router: ^14.1.0 # navegación declarativa
  dio: ^5.4.0 # cliente HTTP
  socket_io_client: ^2.0.3+1 # WebSocket (scoring en vivo)
  flutter_secure_storage: ^9.0.0 # tokens JWT
  intl: ^0.19.0 # formato de fechas
  qr_flutter: ^4.1.0 # compartir por QR
  share_plus: ^9.0.0 # compartir enlaces
  url_launcher: ^6.2.5 # abrir links externos (transmisión, pagos)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
