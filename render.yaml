# Blueprint de Render para el backend (plan gratuito).
# Render detecta este archivo al crear un "Blueprint" desde el repo de GitHub.
#
# Base de datos: usa Neon (https://neon.tech) gratis y persistente; pega su
# connection string en DATABASE_URL. (También sirve la BD gratis de Render.)
services:
  - type: web
    name: caribbean-fest-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    # El esquema se sincroniza en el BUILD (no al arrancar), para que el servidor
    # levante rápido y los errores de BD se vean claros en el log de build.
    buildCommand: npm ci && npx prisma generate && npm run build && npx prisma db push --skip-generate --accept-data-loss
    startCommand: node dist/main.js
    healthCheckPath: /api/tournaments
    envVars:
      - key: DATABASE_URL
        sync: false # ← pega aquí la cadena de Neon (Postgres) en el panel de Render
      - key: CORS_ORIGINS
        sync: false # ← la URL pública del frontend, p. ej. https://caribbean-fest.netlify.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 900s
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: NODE_VERSION
        value: "20"
      # Opcional: push FCM. Pega el JSON de la cuenta de servicio en una sola línea.
      # - key: FIREBASE_SERVICE_ACCOUNT
      #   sync: false
